# =================================================================
#  Configurações principais do TechMister
#  ----------------------------------------------------------------
#  Valores sensíveis (senha, segredo JWT) saem por variáveis de
#  ambiente em produção. Em desenvolvimento, usamos defaults locais
#  com a sintaxe ${VAR:default}.
# =================================================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: techmister

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:techmister}?useSSL=false&serverTimezone=America/Recife&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'validate' = nunca deixa o Hibernate alterar o banco; quem manda no schema é o Flyway.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false   # Vire true se quiser ver os SQLs no console durante o estudo.

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Configuração do JWT.
# IMPORTANTE: em produção, o 'secret' DEVE vir de variável de ambiente.
# A chave precisa ter no mínimo 256 bits (32 caracteres) para HS256.
techmister:
  jwt:
    secret: ${JWT_SECRET:troque-este-segredo-em-producao-precisa-ter-pelo-menos-32-caracteres}
    expiration-hours: 8

# Swagger UI fica em:  http://localhost:8080/api/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    br.com.techmister: DEBUG
    org.springframework.security: INFO
